services:
  - type: web
    name: battlecraps-api
    env: node
    buildCommand: npm install && npm run build -w @battlecraps/shared && npm run build -w @battlecraps/api
    startCommand: node apps/api/dist/server.js
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        sync: false
      - key: CLIENT_ORIGIN
        sync: false
