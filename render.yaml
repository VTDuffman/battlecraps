services:
  - type: web
    name: battlecraps-api
    env: node
    buildCommand: npm install && npm run build -w @battlecraps/shared && npm run build -w @battlecraps/api && node apps/api/dist/db/seed.js
    startCommand: node apps/api/dist/server.js
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        sync: false
      - key: CLIENT_ORIGIN
        sync: false
      - key: CLERK_SECRET_KEY
        sync: false
git push -u origin docs/floor-frameworks