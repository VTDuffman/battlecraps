services:
  postgres:
    image: postgres:16-alpine
    container_name: battlecraps_pg
    restart: unless-stopped
    environment:
      POSTGRES_USER:     ${POSTGRES_USER:-battlecraps}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-battlecraps_dev}
      POSTGRES_DB:       ${POSTGRES_DB:-battlecraps}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - battlecraps_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-battlecraps}"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  battlecraps_pgdata:
    driver: local
